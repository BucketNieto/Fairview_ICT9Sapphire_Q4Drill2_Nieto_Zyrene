<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
</head>
<body>
    <h1>Heat index checker</h1>
<input type="text" id="temp" class="form-control" placeholder="temperature">
    <input type="text" id="humid" class="form-control" placeholder="humidity">
    <button class="btn" onclick="checkHI()">Check Index</button>

    <script>
        function checkHI() {
            var temperature = document.getElementById("temp").value;
            var humidity = document.getElementById("humid").value;
            
            var status = "";

        var HeatIndex = temperature + (0.33 * humidity) - 4;
          switch (true){
            case(HeatIndex <= "27"):
            status = "Cool/Comfortable";
            break;
            case(HeatIndex >= "28"):
            status = "Warm";
            break;
            case(HeatIndex >= "33"):
            status = "Hot";
            break;
             case(HeatIndex >= "38"):
            status = "Very Hot";
            break;
            case(HeatIndex >= "42"):
            status = "Extreme heat";
            break;
          }
          alert("Heat Index:" + HeatIndex.toFixed (1) + "\n" + "Status" + status);
          } 
        
          switch (true){
            case(humid <= "50"):
            status = "Cool/Comfortable";
            break;
            case(humid >= "40"):
            status = "Warm";
            break;
            case(humid >= "50"):
            status = "Hot";
            break;
             case(humid >= "60"):
            status = "Very Hot";
            break;
            case(humid >= "100"):
            status = "Extreme heat";
            break;
          }
    </script>
</body>
</html>

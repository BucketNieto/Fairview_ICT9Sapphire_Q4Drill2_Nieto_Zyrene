<body>
    <h1>Heat index checker</h1>
<input type="text" id="HI" class="form-control" placeholder="Input heatindex">
  <button class="btn" onclick="Index()">Check Index</button>

    <script>
                 function checkHI(){
        var temp = document.getElementById("HI").value;
         var Heatindex;
         var humid;

          var status = "";
       HeatIndex = temperature + (0.33 * humidity) - 4;
          switch (true){
            case(HI <= "27"):rank
            status = "Cool/Comfortable";
            break;
            case(HI === "32"):rank
            status = "Warm";
            break;
            case(HI === "37"):rank
            status = "Hot";
            break;
             case(HI === "41"):rank
            status = "Very Hot";
            break;
            case(HI >= "42"):rank
            status = "Extreme heat";
            break;
          }
          alert("Heat Index:" + HeatIndex.toFixed (1) + "\n" + "Status" + status);
          } 

          switch (true){
            case(humid <= "50"):rank
            status = "Cool/Comfortable";
            break;
            case(humid === "60"):rank
            status = "Warm";
            break;
            case(humid === "70"):rank
            status = "Hot";
            break;
             case(humid === "80"):rank
            status = "Very Hot";
            break;
            case(humid >= "100"):rank
            status = "Extreme heat";
            break;
          }
    </script>
